<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- Pre-paint theme: apply the saved/system dark class before the bundle loads
         so dark-mode users don't get a white flash on every load. ThemeContext
         (key 'hockey-theme') remains the source of truth once React mounts. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('hockey-theme');
          var dark = saved ? saved === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://slpwwoupbbxcgjivcspv.supabase.co" crossorigin />
    <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" />

    <title>ליגת הוקי הגלגיליות הישראלית</title>
    <meta name="description" content="ליגת הוקי גלגיליות - טבלה, משחקים, סטטיסטיקות ועוד" />
    <link rel="canonical" href="https://rinkhockeyil.com/" />

    <!-- Static share preview. Crawlers (WhatsApp, Twitter) do not run JS, so the
         per-route tags set by src/lib/seo.js only reach JS-rendering crawlers
         like Googlebot; these are the fallback everyone else sees. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ליגת הוקי הגלגיליות הישראלית" />
    <meta property="og:locale" content="he_IL" />
    <meta property="og:title" content="ליגת הוקי הגלגיליות הישראלית" />
    <meta property="og:description" content="ליגת הוקי גלגיליות - טבלה, משחקים, סטטיסטיקות ועוד" />
    <meta property="og:url" content="https://rinkhockeyil.com/" />
    <meta property="og:image" content="https://rinkhockeyil.com/logos/main-logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ליגת הוקי הגלגיליות הישראלית" />
    <meta name="twitter:description" content="ליגת הוקי גלגיליות - טבלה, משחקים, סטטיסטיקות ועוד" />
    <meta name="twitter:image" content="https://rinkhockeyil.com/logos/main-logo.png" />
    <meta name="theme-color" content="#3B4FC4" />
  </head>
